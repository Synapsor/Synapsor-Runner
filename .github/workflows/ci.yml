name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm typecheck
      - run: corepack pnpm test
      - run: corepack pnpm test:docker
