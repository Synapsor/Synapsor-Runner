services:
  postgres:
    image: postgres:16
    container_name: synapsor_runner_mcp_postgres_billing
    environment:
      POSTGRES_DB: synapsor_runner_mcp_billing
      POSTGRES_USER: synapsor_admin
      POSTGRES_PASSWORD: synapsor_admin_password
    ports:
      - "55433:5432"
    volumes:
      - ./seed:/docker-entrypoint-initdb.d:ro
